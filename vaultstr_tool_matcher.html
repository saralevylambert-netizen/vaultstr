<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultSTR Tool Matcher — Find Your STR Stack</title>
<meta name="description" content="Tell us about your STR situation and we'll match you to exactly the tools you need. 75 companies, 18 categories, curated by VaultSTR.">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fffcf7;--black:#161415;--black-80:#161415cc;--black-60:#16141599;--black-30:#1614154d;--black-15:#16141526;--black-08:#16141514;--black-04:#1614150a;
  --red:#c03a38;--red-soft:#c03a3818;--green:#2d6a4f;--green-soft:#2d6a4f14;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--serif:'Instrument Serif',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--black);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ── LAYOUT ── */
.wrap{max-width:720px;margin:0 auto;padding:0 24px;}

/* ── LANDING ── */
#landing{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 24px;animation:fadeUp .8s ease;}
#landing .v-logo{width:52px;height:52px;background:var(--black);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;border-radius:12px;margin-bottom:32px;}
#landing h1{font-size:clamp(36px,6vw,56px);font-weight:500;letter-spacing:-1.8px;line-height:110%;margin-bottom:12px;}
#landing h1 i{font-family:var(--serif);font-style:italic;font-weight:400;}
#landing .sub{font-size:18px;color:var(--black-60);line-height:160%;max-width:440px;margin:0 auto 40px;}
#landing .cta-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.btn-primary{padding:16px 40px;background:var(--black);color:var(--bg);border:none;border-radius:999px;font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:all .25s;}
.btn-primary:hover{background:var(--red);}
.btn-ghost{padding:16px 40px;background:transparent;color:var(--black-60);border:1px solid var(--black-15);border-radius:999px;font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;transition:all .25s;}
.btn-ghost:hover{border-color:var(--black);color:var(--black);}
#landing .social-proof{margin-top:48px;font-size:13px;color:var(--black-30);letter-spacing:.5px;}

/* ── QUIZ FLOW ── */
#quiz{display:none;min-height:100vh;}
.quiz-top{position:sticky;top:0;z-index:10;background:var(--bg);padding:20px 0 0;border-bottom:1px solid var(--black-08);}
.quiz-top-inner{max-width:720px;margin:0 auto;padding:0 24px 16px;display:flex;justify-content:space-between;align-items:center;}
.quiz-top .logo-sm{font-size:14px;font-weight:600;letter-spacing:-.3px;color:var(--black-30);}
.quiz-top .step-count{font-size:13px;color:var(--black-30);font-variant-numeric:tabular-nums;}
.prog-track{height:3px;background:var(--black-04);}
.prog-fill{height:100%;background:var(--black);transition:width .5s cubic-bezier(.4,0,.2,1);}

.q-slide{max-width:720px;margin:0 auto;padding:60px 24px 40px;opacity:0;transform:translateY(20px);transition:all .45s cubic-bezier(.4,0,.2,1);}
.q-slide.active{opacity:1;transform:translateY(0);}
.q-slide .q-num{font-size:12px;text-transform:uppercase;letter-spacing:2.5px;color:var(--red);font-weight:600;margin-bottom:14px;}
.q-slide h2{font-size:clamp(24px,4vw,32px);font-weight:500;letter-spacing:-.4px;line-height:125%;margin-bottom:6px;}
.q-slide .q-hint{font-size:15px;color:var(--black-60);margin-bottom:28px;}

/* Option cards */
.opt-grid{display:flex;flex-direction:column;gap:8px;}
.opt{position:relative;padding:18px 22px;border:1.5px solid var(--black-15);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;border-radius:2px;}
.opt:hover{border-color:var(--black-30);background:var(--black-04);}
.opt.on{border-color:var(--black);background:var(--black);color:var(--bg);}
.opt .ck{width:22px;height:22px;border:1.5px solid var(--black-30);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.opt.on .ck{border-color:var(--bg);background:var(--bg);}
.opt.on .ck::after{content:'';width:10px;height:10px;background:var(--black);border-radius:50%;}
.opt.multi .ck{border-radius:4px;}
.opt.multi.on .ck{border-radius:4px;}
.opt.multi.on .ck::after{border-radius:2px;width:10px;height:10px;}
.opt .opt-label{font-size:16px;font-weight:400;letter-spacing:-.16px;line-height:140%;}

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--black-08);}
.q-nav .back-btn{font-size:14px;color:var(--black-30);background:none;border:none;cursor:pointer;font-family:var(--font);padding:8px 0;transition:color .2s;}
.q-nav .back-btn:hover{color:var(--black);}
.q-nav .next-btn{padding:14px 36px;background:var(--black);color:var(--bg);border:none;border-radius:999px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;}
.q-nav .next-btn:hover{background:var(--red);}
.q-nav .next-btn:disabled{opacity:.15;cursor:not-allowed;background:var(--black);}
.q-nav .next-btn.final{background:var(--red);}
.q-nav .next-btn.final:hover{opacity:.9;}
.q-nav .next-btn.final:disabled{opacity:.15;}

/* ── RESULTS ── */
#results{display:none;animation:fadeUp .6s ease;}
.res-hero{text-align:center;padding:64px 24px 48px;border-bottom:1px solid var(--black-08);}
.res-hero .v-logo{width:40px;height:40px;background:var(--black);color:var(--bg);display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;border-radius:10px;margin-bottom:20px;}
.res-hero h2{font-size:clamp(28px,5vw,40px);font-weight:500;letter-spacing:-1px;line-height:115%;margin-bottom:8px;}
.res-hero h2 i{font-family:var(--serif);font-style:italic;font-weight:400;}
.res-hero .res-sub{font-size:16px;color:var(--black-60);max-width:460px;margin:0 auto;}

.res-body{max-width:720px;margin:0 auto;padding:0 24px;}

/* Recommendation block */
.rec{padding:40px 0;border-bottom:1px solid var(--black-08);}
.rec:last-of-type{border-bottom:none;}
.rec-head{margin-bottom:20px;}
.rec-cat{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:var(--red);font-weight:600;margin-bottom:8px;}
.rec-title{font-size:20px;font-weight:500;letter-spacing:-.2px;line-height:140%;color:var(--black-80);}

.rec-pick{border:1.5px solid var(--black-15);padding:28px;display:flex;gap:20px;align-items:flex-start;transition:border-color .2s;position:relative;overflow:hidden;}
.rec-pick::before{content:'OUR PICK';position:absolute;top:0;right:0;background:var(--black);color:var(--bg);font-size:10px;letter-spacing:1.5px;font-weight:600;padding:6px 14px;}
.rec-pick:hover{border-color:var(--black-30);}
.rec-pick .pick-num{width:48px;height:48px;flex-shrink:0;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;border-radius:10px;font-family:var(--serif);font-style:italic;}
.rec-pick .pick-body{flex:1;min-width:0;}
.rec-pick .pick-body h3{font-size:22px;font-weight:500;letter-spacing:-.3px;margin-bottom:2px;}
.rec-pick .pick-body .pick-desc{font-size:15px;color:var(--black-60);line-height:155%;margin-bottom:8px;}
.rec-pick .pick-body .pick-price{display:inline-block;font-size:14px;font-weight:500;background:var(--black-08);padding:4px 14px;margin-bottom:10px;letter-spacing:-.2px;}
.rec-pick .pick-body .pick-why{font-size:14px;color:var(--black-80);line-height:155%;margin-bottom:12px;padding:12px 0;border-top:1px solid var(--black-08);font-style:italic;}
.rec-pick .pick-body .pick-link{font-size:14px;color:var(--red);text-decoration:none;font-weight:500;transition:opacity .2s;}
.rec-pick .pick-body .pick-link:hover{opacity:.7;}

.rec-alt{margin-top:8px;padding:16px 20px;border:1px solid var(--black-08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.rec-alt .alt-info{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.rec-alt .alt-tag{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--black-30);font-weight:500;}
.rec-alt .alt-name{font-size:15px;font-weight:500;}
.rec-alt .alt-price{font-size:13px;color:var(--black-60);}
.rec-alt a{font-size:13px;color:var(--red);text-decoration:none;font-weight:500;white-space:nowrap;}
.rec-alt a:hover{opacity:.7;}

.res-footer{text-align:center;padding:48px 24px 24px;}
.res-footer .retake{padding:14px 40px;background:transparent;border:1px solid var(--black-15);color:var(--black-60);border-radius:999px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.res-footer .retake:hover{border-color:var(--black);color:var(--black);}
.res-footer .browse-link{display:block;font-size:14px;color:var(--black-30);cursor:pointer;background:none;border:none;font-family:var(--font);margin:8px auto;transition:color .2s;}
.res-footer .browse-link:hover{color:var(--black);}

/* ── BROWSE ── */
#browse{display:none;animation:fadeUp .5s ease;}
.browse-header{padding:48px 0 32px;text-align:center;}
.browse-header h2{font-size:28px;font-weight:500;letter-spacing:-.3px;margin-bottom:4px;}
.browse-header h2 i{font-family:var(--serif);font-style:italic;font-weight:400;}
.browse-header p{color:var(--black-60);font-size:15px;}

.browse-bar{margin-bottom:16px;}
.browse-bar input{width:100%;padding:16px 20px;background:transparent;border:1.5px solid var(--black-15);color:var(--black);font-family:var(--font);font-size:16px;outline:none;transition:border-color .2s;border-radius:2px;}
.browse-bar input:focus{border-color:var(--black);}
.browse-bar input::placeholder{color:var(--black-30);}

.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.pill{padding:8px 16px;background:transparent;border:1px solid var(--black-15);border-radius:999px;font-family:var(--font);font-size:12px;color:var(--black-60);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;}
.pill:hover{border-color:var(--black);color:var(--black);}
.pill.on{background:var(--black);border-color:var(--black);color:var(--bg);}

.b-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--black-08);border:1px solid var(--black-08);margin-bottom:12px;}
.b-card{padding:24px;background:var(--bg);transition:background .2s;}
.b-card:hover{background:var(--black-04);}
.b-card .b-cat{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--black-30);margin-bottom:8px;font-weight:500;}
.b-card h4{font-size:17px;font-weight:500;letter-spacing:-.18px;margin-bottom:2px;}
.b-card .b-price{font-size:13px;font-weight:500;color:var(--black);margin-bottom:4px;}
.b-card .b-desc{font-size:14px;color:var(--black-60);margin-bottom:10px;line-height:150%;}
.b-card a{font-size:13px;color:var(--red);text-decoration:none;font-weight:500;}
.b-card a:hover{opacity:.7;}
.b-count{text-align:center;padding:20px;color:var(--black-30);font-size:13px;}

.b-back{display:block;margin:12px auto 48px;font-size:14px;color:var(--black-30);cursor:pointer;background:none;border:none;font-family:var(--font);transition:color .2s;}
.b-back:hover{color:var(--black);}

.site-footer{text-align:center;padding:32px 0;border-top:1px solid var(--black-08);margin-top:24px;}
.site-footer p{font-size:12px;color:var(--black-30);}
.site-footer a{color:var(--red);text-decoration:none;}


/* ── LOGOS ── */
.logo-img{width:40px;height:40px;border-radius:8px;object-fit:contain;flex-shrink:0;background:#fff;border:1px solid var(--black-08);}
.rec-pick .logo-img{width:48px;height:48px;border-radius:10px;}
.rec-alt .logo-img{width:28px;height:28px;border-radius:6px;}
.b-card .logo-img{width:36px;height:36px;border-radius:8px;margin-bottom:8px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  .rec-pick{flex-direction:column;padding:20px;}
  .rec-pick::before{font-size:9px;padding:5px 10px;}
  .rec-alt{flex-direction:column;align-items:flex-start;}
  .b-grid{grid-template-columns:1fr;}
  .q-slide{padding:40px 24px 32px;}
}
</style>
</head>

let S=0,A={};

function startQuiz(){hide('landing');show('quiz');S=0;A={};rQ();}
function showBrowse(){hide('landing');hide('quiz');hide('results');show('browse');initB();}
function goHome(){hide('browse');hide('results');hide('quiz');show('landing');}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}

function rQ(){
  const q=Q[S];
  document.getElementById('stepLabel').textContent=`${S+1} / ${Q.length}`;
  document.getElementById('progFill').style.width=((S)/Q.length*100)+'%';
  const sel=A[q.id]||[];
  let h=`<div class="q-slide active"><div class="q-num">${q.id==='stage'?'Let\u2019s start':q.id==='budget'?'Last one':''}</div><h2>${q.q}</h2>`;
  if(q.hint) h+=`<p class="q-hint">${q.hint}</p>`;
  h+=`<div class="opt-grid">`;
  q.o.forEach((o,i)=>{
    h+=`<div class="opt ${q.m?'multi':''} ${sel.includes(i)?'on':''}" onclick="oSel(${i})"><div class="ck"></div><div class="opt-label">${o.l}</div></div>`;
  });
  h+=`</div><div class="q-nav">`;
  h+=S>0?`<button class="back-btn" onclick="qBack()">\u2190 Back</button>`:`<button class="back-btn" onclick="goHome()">\u2190 Exit</button>`;
  const last=S===Q.length-1;
  h+=`<button class="next-btn ${last?'final':''}" onclick="${last?'doResults()':'qNext()'}" ${sel.length===0?'disabled':''}>${last?'See my recommendations':'Continue'}</button>`;
  h+=`</div></div>`;
  document.getElementById('qArea').innerHTML=h;
  requestAnimationFrame(()=>{document.querySelector('.q-slide').classList.add('active');});
}

function oSel(i){
  const q=Q[S];let s=A[q.id]||[];
  if(q.m){
    if(q.o[i].v==='has-none'){s=[i];}
    else{s=s.filter(x=>Q[S].o[x].v!=='has-none');s.includes(i)?s=s.filter(x=>x!==i):s.length<(q.mx||99)&&s.push(i);}
  }else s=[i];
  A[q.id]=s;rQ();
}
function qNext(){if(S<Q.length-1){S++;rQ();}}
function qBack(){if(S>0){S--;rQ();}}

let aC=null;
function initB(){
  let h=`<button class="pill on" onclick="fC(null)">All (${D.length})</button>`;
  CATS.forEach(c=>{const n=D.filter(x=>x.c===c).length;h+=`<button class="pill" onclick="fC('${c.replace(/'/g,"\\'")}')">${c} (${n})</button>`;});
  document.getElementById('pills').innerHTML=h;
  aC=null;document.getElementById('searchIn').value='';rG(D);
}
function fC(c){
  aC=c;
  document.querySelectorAll('.pill').forEach(p=>{const m=c===null?p.textContent.startsWith('All'):p.textContent.startsWith(c);p.classList.toggle('on',m);});
  filt();
}
function filt(){
  const q=document.getElementById('searchIn').value.toLowerCase();
  let f=D;
  if(aC)f=f.filter(x=>x.c===aC);
  if(q)f=f.filter(x=>`${x.n} ${x.d} ${x.c} ${x.t.join(' ')}`.toLowerCase().includes(q));
  rG(f);
}
function rG(items){
  let h='';
  items.forEach(x=>{h+=`<div class="b-card">${L(x.n)?`<img class="logo-img" src="${L(x.n)}" alt="${x.n}">`:'' }<div class="b-cat">${x.c}</div><h4>${x.n}</h4><div class="b-price">${x.p}</div><div class="b-desc">${x.d}</div><a href="https://${x.w}" target="_blank">${x.w} \u2192</a></div>`;});
  document.getElementById('bGrid').innerHTML=h||'<div style="padding:40px;text-align:center;color:var(--black-30);grid-column:1/-1">No tools match your search.</div>';
  document.getElementById('bCount').textContent=`${items.length} of ${D.length} tools`;
}
